services:
  redis:
    image: redis:7-alpine
    container_name: toonflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  toonflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        GIT: ${GIT:-github}
        TAG: ${TAG:-}
        BRANCH: ${BRANCH:-}
    image: toonflow:${TAG:-latest}
    container_name: toonflow
    restart: unless-stopped
    ports:
      - "80"
      - "60000:60000"
    environment:
      - NODE_ENV=prod
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    volumes:
      # 可选: 持久化日志
      - ../logs:/var/log
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  redis-data:
